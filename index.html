<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tearable Art</title>
    <meta
      name="description"
      content="An immersive layered artwork that can be torn away to reveal the pieces underneath."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="stage" aria-label="Tearable layered artwork">
      <canvas id="artCanvas" aria-hidden="true"></canvas>

      <div class="controls">
        <div class="controls-copy">
          <h1>Tearable Art</h1>
          <p id="layerStatus" class="layer-status" aria-live="polite">Layer 1 of 5</p>
        </div>
        <button id="resetButton" type="button">Reset</button>
      </div>
    </main>

    <script type="module" src="script.js"></script>
  </body>
</html>
